name: Promote Service to Production

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Select service to promote"
        required: true
        type: choice
        options:
          - api-gateway
          - frontend-ui
          - incidents-service
          - telemetry-store
          - analysis-service
          - dependency-service
          - ingest-service
          - worker-service

      version:
        description: "New production version tag, example: v1.0.0"
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate version format
        run: |
          if ! [[ "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: version must match vX.Y.Z (e.g. v1.2.3)"
            exit 1
          fi

      - name: Install yq
        run: |
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

      - name: Read dev image tag
        id: devtag
        run: |
          SERVICE="${{ github.event.inputs.service_name }}"
          SERVICE_DIR="$SERVICE"
          if [ "$SERVICE" = "frontend-ui" ]; then
            SERVICE_DIR="frontend"
          fi
          
          DEV_FILE="k8s/dev-apps/$SERVICE_DIR/deployment.yaml"
          if [ ! -f "$DEV_FILE" ]; then
            DEV_FILE="kubernetes-main/$DEV_FILE"
          fi
          if [ ! -f "$DEV_FILE" ]; then
            echo "ERROR: $DEV_FILE not found in repository"
            exit 1
          fi
          
          # Extract the image from dev deployments
          IMAGE_PATH=$(yq eval 'select(.kind == "Deployment") | .spec.template.spec.containers[0].image' "$DEV_FILE")
          if [ -z "$IMAGE_PATH" ] || [ "$IMAGE_PATH" = "null" ]; then
            echo "ERROR: Could not find image for service $SERVICE in $DEV_FILE"
            exit 1
          fi
          
          # Extract tag and base image
          DEV_TAG=$(echo "$IMAGE_PATH" | awk -F: '{print $2}')
          BASE_IMAGE=$(echo "$IMAGE_PATH" | awk -F: '{print $1}')
          
          if [ -z "$DEV_TAG" ] || [ "$DEV_TAG" = "null" ]; then
            echo "ERROR: image tag not found for $SERVICE in $DEV_FILE"
            exit 1
          fi
          
          echo "dev_tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          echo "base_image=$BASE_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Dev tag found: $DEV_TAG for image: $BASE_IMAGE"

      - name: Docker login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER || 'incidenttracker.azurecr.io' }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull dev image, retag and push prod image
        run: |
          SERVICE="${{ github.event.inputs.service_name }}"
          DEV_TAG="${{ steps.devtag.outputs.dev_tag }}"
          PROD_TAG="${{ github.event.inputs.version }}"
          BASE_IMAGE="${{ steps.devtag.outputs.base_image }}"
          
          SOURCE_IMAGE="$BASE_IMAGE:$DEV_TAG"
          PROD_IMAGE="$BASE_IMAGE:$PROD_TAG"
          
          echo "Pulling source image: $SOURCE_IMAGE"
          docker pull "$SOURCE_IMAGE"
          echo "Retagging image: $PROD_IMAGE"
          docker tag "$SOURCE_IMAGE" "$PROD_IMAGE"
          echo "Pushing prod image: $PROD_IMAGE"
          docker push "$PROD_IMAGE"

      - name: Update prod deployments file
        run: |
          SERVICE="${{ github.event.inputs.service_name }}"
          PROD_TAG="${{ github.event.inputs.version }}"
          BASE_IMAGE="${{ steps.devtag.outputs.base_image }}"
          
          SERVICE_DIR="$SERVICE"
          if [ "$SERVICE" = "frontend-ui" ]; then
            SERVICE_DIR="frontend"
          fi
          
          PROD_FILE="k8s/prod-apps/$SERVICE_DIR/deployment.yaml"
          if [ ! -f "$PROD_FILE" ]; then
            PROD_FILE="kubernetes-main/$PROD_FILE"
          fi
          if [ ! -f "$PROD_FILE" ]; then
            echo "ERROR: $PROD_FILE not found in repository"
            exit 1
          fi
          
          OLD_PROD_TAG=$(yq eval 'select(.kind == "Deployment") | .spec.template.spec.containers[0].image' "$PROD_FILE" | awk -F: '{print $2}')
          echo "Service: $SERVICE"
          echo "Old prod tag: $OLD_PROD_TAG"
          echo "New prod tag: $PROD_TAG"
          
          # Update deployments.yaml for production
          yq eval -i '(select(.kind == "Deployment") | .spec.template.spec.containers[0].image) = "'"$BASE_IMAGE:$PROD_TAG"'"' "$PROD_FILE"
          git add "$PROD_FILE"
          
          # Update nested kubernetes-main copy if it exists and is a different file
          NESTED_PROD_FILE="kubernetes-main/k8s/prod-apps/$SERVICE_DIR/deployment.yaml"
          if [ "$PROD_FILE" != "$NESTED_PROD_FILE" ] && [ -f "$NESTED_PROD_FILE" ]; then
            yq eval -i '(select(.kind == "Deployment") | .spec.template.spec.containers[0].image) = "'"$BASE_IMAGE:$PROD_TAG"'"' "$NESTED_PROD_FILE"
            git add "$NESTED_PROD_FILE"
          fi
          
          git config user.name "incidenttracker-ci-bot"
          git config user.email "ci-bot@incidenttracker.local"
          if git diff --quiet --cached; then
            echo "No change. $SERVICE prod already has tag $PROD_TAG"
            exit 0
          fi
          
          git commit -m "promote($SERVICE): ${{ steps.devtag.outputs.dev_tag }} -> $PROD_TAG"
          git push

      - name: Slack Notification
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          SERVICE: ${{ github.event.inputs.service_name }}
          DEV_TAG: ${{ steps.devtag.outputs.dev_tag }}
          PROD_TAG: ${{ github.event.inputs.version }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MESSAGE="🚀 *Production Promotion Success* 🚀\n*Service:* \`${SERVICE}\`\n*Dev source tag:* \`${DEV_TAG}\`\n*Production tag:* \`${PROD_TAG}\`\n*Triggered by:* \`${{ github.actor }}\`\nPromotion completed successfully! ✅"
            echo "### Production Promotion Success ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **Service:** $SERVICE" >> $GITHUB_STEP_SUMMARY
            echo "- **Dev Source Tag:** $DEV_TAG" >> $GITHUB_STEP_SUMMARY
            echo "- **Production Tag:** $PROD_TAG" >> $GITHUB_STEP_SUMMARY
            echo "- **Triggered By:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          else
            MESSAGE="❌ *Production Promotion Failure* ❌\n*Service:* \`${SERVICE}\`\n*Requested production tag:* \`${PROD_TAG}\`\n*Triggered by:* \`${{ github.actor }}\`\nPromotion failed. Please check the workflow logs."
            echo "### Production Promotion Failure ❌" >> $GITHUB_STEP_SUMMARY
            echo "- **Service:** $SERVICE" >> $GITHUB_STEP_SUMMARY
            echo "- **Requested Production Tag:** $PROD_TAG" >> $GITHUB_STEP_SUMMARY
            echo "- **Triggered By:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Send Slack notification using the webhook URL directly without conditional skip checks
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$MESSAGE\"}" "$SLACK_WEBHOOK_URL"
