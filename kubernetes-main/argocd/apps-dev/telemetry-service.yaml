apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-incident-manager-dev-telemetry-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kubernetes-Incident-Manager/kubernetes.git
    targetRevision: main
    path: k8s/dev-apps/telemetry-store
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
