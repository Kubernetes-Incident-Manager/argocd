apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-incident-manager-prod-redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kubernetes-Incident-Manager/kubernetes.git
    targetRevision: main
    path: k8s/prod-apps/redis
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
